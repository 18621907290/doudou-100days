<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>兜兜 · 百日宴邀请函</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #F5EDE4;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }
  .container { max-width: 480px; width: 100%; }
  
  /* 封面卡片 */
  .cover-card {
    background: #fff;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(0,0,0,0.1);
    cursor: pointer;
    transition: transform 0.3s ease;
    position: relative;
  }
  .cover-card:hover { transform: translateY(-4px); }
  .cover-overlay {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 40px 20px 20px;
    background: linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 100%);
    color: #fff;
  }
  .cover-overlay h1 { font-size: 24px; font-weight: 700; letter-spacing: 4px; margin-bottom: 8px; }
  .cover-overlay p { font-size: 14px; opacity: 0.9; letter-spacing: 2px; }
  .tap-hint {
    position: absolute;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    color: #fff;
    font-size: 13px;
    letter-spacing: 2px;
    animation: bounce 2s ease-in-out infinite;
    text-shadow: 0 1px 4px rgba(0,0,0,0.5);
  }
  @keyframes bounce {
    0%, 100% { transform: translateX(-50%) translateY(0); opacity: 1; }
    50% { transform: translateX(-50%) translateY(8px); opacity: 0.6; }
  }
  
  /* 详情页 */
  .detail-page { 
    display: none; 
    background: #FFFBF5; 
    max-width: 480px; 
    width: 100%; 
    border-radius: 16px; 
    overflow: hidden; 
    box-shadow: 0 4px 24px rgba(0,0,0,0.1); 
    animation: slideUp 0.5s ease; 
  }
  @keyframes slideUp { 
    from { opacity: 0; transform: translateY(40px); } 
    to { opacity: 1; transform: translateY(0); } 
  }
  .detail-header {
    background: linear-gradient(135deg, #B68A53 0%, #D4B896 100%);
    color: #fff;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .back-btn {
    background: rgba(255,255,255,0.2);
    border: none;
    color: #fff;
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .detail-title { font-size: 16px; font-weight: 600; letter-spacing: 2px; }
  .tip-text { text-align: center; color: #999; font-size: 12px; padding: 20px; letter-spacing: 1px; }
  .detail-image { width: 100%; display: block; }
</style>
</head>
<body>
<div class="container">
  <!-- 封面卡片 -->
  <div class="cover-card" id="coverCard" onclick="openDetail()">
    <div style="position: relative;">
      <img src="https://raw.githubusercontent.com/18621907290/doudou-100days/main/cover.jpg" alt="兜兜百日宴" style="width:100%; display:block; border-radius: 16px 16px 0 0;" />
      <div class="cover-overlay">
        <h1>兜兜 · 百日宴</h1>
        <p>诚邀您及家人参加</p>
      </div>
      <div class="tap-hint">
        <span>点击查看完整邀请函</span>
      </div>
    </div>
  </div>
  
  <!-- 详情页 -->
  <div class="detail-page" id="detailPage">
    <div class="detail-header">
      <button class="back-btn" onclick="closeDetail()">← 返回</button>
      <span class="detail-title">兜兜百日宴邀请函</span>
      <div style="width: 60px;"></div>
    </div>
    <img class="detail-image" src="https://raw.githubusercontent.com/18621907290/doudou-100days/main/doudou-detail-full-hd.png" alt="百日宴邀请函详情" />
    <p class="tip-text">长按图片保存到相册，分享给亲朋好友 🎉</p>
  </div>
</div>

<script>
function openDetail() {
  document.getElementById('coverCard').style.display = 'none';
  document.getElementById('detailPage').style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function closeDetail() {
  document.getElementById('detailPage').style.display = 'none';
  document.getElementById('coverCard').style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
</body>
</html>
