<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<!-- ══════ WeChat Open Graph 分享卡片标签 ══════ -->
<meta property="og:title" content="兜兜百日宴邀请函">
<meta property="og:description" content="2026年7月5日 · 醴陵春风醴食府3楼宴会厅 · 诚邀您及家人参加唐若昕（兜兜）小朋友百日宴">
<meta property="og:image" content="https://doudou100days.cn/cover.jpg">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:type" content="website">
<meta property="og:url" content="https://doudou100days.cn/">
<meta property="og:site_name" content="兜兜百日宴">
<title>兜兜 · 百日宴</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
    background: #F5EDE4;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-font-smoothing: antialiased;
    -webkit-tap-highlight-color: transparent;
  }

  .cover {
    width: 100%; max-width: 480px; min-height: 100vh;
    background: #FFFFFF;
    box-shadow: 0 0 80px rgba(0,0,0,0.05);
    position: relative; overflow: hidden;
    display: flex; flex-direction: column;
  }
  @media (min-width: 481px) {
    .cover { border-radius: 28px; min-height: auto; margin: 16px auto; }
  }

  .hero {
    position: relative; width: 100%; flex: 1; min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  @media (min-width: 481px) {
    .hero { min-height: 680px; }
  }

  .hero-bg {
    position: absolute; inset: 0;
    background: linear-gradient(170deg,
      #F5EDE4 0%, #EDE0D4 30%, #E8D5C0 60%, #DDC8B0 100%);
  }
  .hero-bg::after {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 70%, rgba(182,138,83,0.08) 0%, transparent 60%);
  }

  .decor { position: absolute; border-radius: 50%; pointer-events: none; }
  .d1 {
    top: -8%; right: -30%; width: 70vw; height: 70vw; max-width: 340px; max-height: 340px;
    background: radial-gradient(circle, rgba(212,184,150,0.12), transparent 70%);
    animation: floatA 14s ease-in-out infinite;
  }
  .d2 {
    bottom: -10%; left: -25%; width: 60vw; height: 60vw; max-width: 280px; max-height: 280px;
    background: radial-gradient(circle, rgba(201,123,91,0.08), transparent 70%);
    animation: floatB 18s ease-in-out infinite;
  }
  @keyframes floatA { 0%,100%{transform:translate(0,0)} 33%{transform:translate(15px,-10px)} 66%{transform:translate(-8px,8px)} }
  @keyframes floatB { 0%,100%{transform:translate(0,0)} 33%{transform:translate(-10px,12px)} 66%{transform:translate(12px,-6px)} }

  .content {
    position: relative; z-index: 2; text-align: center;
    padding: 40px 32px; width: 100%;
  }

  .top-label {
    font-family: 'STSongti-SC', 'Songti SC', 'Noto Serif SC', serif;
    font-size: 12px; letter-spacing: 8px; color: #B68A53;
    margin-bottom: 40px;
  }

  .ornament {
    display: flex; align-items: center; justify-content: center;
    gap: 16px; margin-bottom: 32px;
  }
  .orn-line {
    width: 40px; height: 1px; background: linear-gradient(90deg, transparent, #B68A53, transparent);
  }
  .orn-diamond {
    width: 10px; height: 10px; background: #B68A53;
    transform: rotate(45deg); border-radius: 1px;
  }

  .main-title {
    font-family: 'STSongti-SC', 'Songti SC', 'Noto Serif SC', serif;
    font-size: 48px; font-weight: 900; color: #3D3226;
    letter-spacing: 10px; line-height: 1.3; margin-bottom: 10px;
  }
  .main-sub {
    display: block; font-size: 18px; font-weight: 400;
    letter-spacing: 8px; color: #B68A53; margin-top: 4px;
  }

  .baby-name {
    font-family: 'STSongti-SC', 'Songti SC', 'Noto Serif SC', serif;
    font-size: 26px; letter-spacing: 12px; color: #3D3226;
    margin: 36px 0 10px;
  }
  .baby-nick {
    font-size: 13px; color: #9B8D7F; letter-spacing: 6px;
    margin-bottom: 40px;
  }

  .info-row {
    display: flex; align-items: center; justify-content: center;
    gap: 12px; margin-bottom: 8px;
    font-size: 15px; color: #6B5D4F; letter-spacing: 2px;
  }
  .info-row .ico { font-size: 16px; }
  .info-row .hl { color: #B68A53; font-weight: 600; }

  .enter-btn {
    display: inline-block; margin-top: 44px;
    padding: 16px 48px;
    background: linear-gradient(135deg, #C9A96E, #B68A53);
    color: #fff; font-size: 16px; letter-spacing: 6px;
    border-radius: 50px; text-decoration: none;
    box-shadow: 0 6px 24px rgba(182,138,83,0.35);
    transition: all 0.3s ease;
    cursor: pointer; border: none;
  }
  .enter-btn:active { transform: scale(0.96); opacity: 0.9; }

  .bottom-hint {
    margin-top: 36px; font-size: 11px; color: #B68A53;
    letter-spacing: 3px; opacity: 0.7;
  }

  .loading-dots {
    display: inline-flex; gap: 6px; margin-left: 4px;
  }
  .loading-dots span {
    width: 5px; height: 5px; background: #B68A53;
    border-radius: 50%; animation: dotBounce 1.4s ease-in-out infinite;
  }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dotBounce { 0%,80%,100%{opacity:0.2;transform:scale(0.8)} 40%{opacity:1;transform:scale(1.2)} }
</style>
</head>
<body>
<div class="cover">
  <div class="hero">
    <div class="hero-bg"></div>
    <div class="decor d1"></div>
    <div class="decor d2"></div>

    <div class="content">
      <div class="top-label">100 DAYS</div>

      <div class="ornament">
        <span class="orn-line"></span>
        <span class="orn-diamond"></span>
        <span class="orn-line"></span>
      </div>

      <h1 class="main-title">百日宴<span class="main-sub">邀请函</span></h1>

      <div class="baby-name">唐 若 昕</div>
      <div class="baby-nick">小名 · 兜兜</div>

      <div class="info-row"><span class="ico">📅</span> 2026年7月5日 · 星期日</div>
      <div class="info-row"><span class="ico">⏰</span> 上午 11:38 · <span class="hl">恭候光临</span></div>
      <div class="info-row"><span class="ico">📍</span> 春风醴食府 · 3楼宴会厅</div>
      <div class="info-row" style="font-size:12px;color:#9B8D7F;margin-top:2px;">湖南省株洲市醴陵市</div>

      <a class="enter-btn" href="invitation.html">✨ 打 开 邀 请 函 ✨</a>
      <div class="bottom-hint">
        即将自动跳转
        <span class="loading-dots"><span></span><span></span><span></span></span>
      </div>
    </div>
  </div>
</div>

<script>
  // 1.8秒后自动跳转到完整邀请函（微信爬虫不会执行JS，它只读取静态head中的OG标签）
  setTimeout(function() {
    location.href = 'invitation.html';
  }, 1800);
</script>
</body>
</html>
