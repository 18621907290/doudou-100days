<title>兜兜 · 百日宴</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --gold: #B68A53;
    --gold-dark: #A0764A;
    --gold-light: #D4B896;
  }

  body {
    font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #1a1a1a;
    color: #fff;
    overflow: hidden;
    height: 100vh;
    height: 100dvh;
    -webkit-font-smoothing: antialiased;
    -webkit-tap-highlight-color: transparent;
    -webkit-text-size-adjust: 100%;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ══════ COVER CONTAINER ══════ */
  .cover {
    position: relative;
    width: 100%;
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* ══════ BACKGROUND PHOTO ══════ */
  .cover-bg {
    position: absolute;
    inset: 0;
    z-index: 0;
  }
  .cover-bg img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 30%;
  }

  /* ══════ OVERLAYS ══════ */
  .cover-overlay {
    position: absolute;
    inset: 0;
    z-index: 1;
    background: linear-gradient(
      to bottom,
      rgba(20, 15, 10, 0.25) 0%,
      rgba(20, 15, 10, 0.08) 30%,
      rgba(20, 15, 10, 0.05) 50%,
      rgba(20, 15, 10, 0.35) 75%,
      rgba(20, 15, 10, 0.65) 90%,
      rgba(20, 15, 10, 0.78) 100%
    );
  }

  .cover-vignette {
    position: absolute;
    inset: 0;
    z-index: 2;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(10, 8, 5, 0.35) 100%);
    pointer-events: none;
  }

  /* ══════ CONTENT LAYER ══════ */
  .cover-content {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    padding: 40px 28px;
    text-align: center;
  }

  /* ══════ TOP LABEL ══════ */
  .cover-top-label {
    font-family: 'Noto Serif SC', serif;
    font-size: 12px;
    letter-spacing: 8px;
    color: rgba(255, 255, 255, 0.8);
    text-shadow: 0 1px 8px rgba(0, 0, 0, 0.2);
    margin-bottom: 24px;
  }

  /* ══════ GOLD DECORATIVE LINE ══════ */
  .cover-decor {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 28px;
  }
  .cover-decor-line {
    width: 48px;
    height: 1px;
    background: var(--gold);
    opacity: 0.7;
  }
  .cover-decor-diamond {
    width: 8px;
    height: 8px;
    background: var(--gold);
    transform: rotate(45deg);
    opacity: 0.85;
  }

  /* ══════ MAIN TITLE ══════ */
  .cover-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 52px;
    font-weight: 900;
    letter-spacing: 12px;
    color: #fff;
    text-shadow: 0 2px 24px rgba(0, 0, 0, 0.3);
    line-height: 1.3;
    margin-bottom: 18px;
  }
  @media (max-width: 380px) {
    .cover-title { font-size: 42px; letter-spacing: 8px; }
  }

  /* ══════ BABY NAME ══════ */
  .cover-name {
    font-family: 'Noto Serif SC', serif;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 8px;
    color: rgba(255, 255, 255, 0.95);
    text-shadow: 0 1px 12px rgba(0, 0, 0, 0.25);
    margin-bottom: 32px;
  }

  /* ══════ DIVIDER ══════ */
  .cover-divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 28px;
  }
  .cover-dot {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--gold-light);
    opacity: 0.8;
  }
  .cover-dot-line {
    width: 36px;
    height: 1px;
    background: var(--gold-light);
    opacity: 0.5;
  }

  /* ══════ INFO TEXT ══════ */
  .cover-date {
    font-family: 'Noto Serif SC', serif;
    font-size: 17px;
    letter-spacing: 5px;
    color: var(--gold-light);
    text-shadow: 0 1px 8px rgba(0, 0, 0, 0.2);
    margin-bottom: 12px;
  }
  .cover-location {
    font-size: 14px;
    letter-spacing: 3px;
    color: rgba(255, 255, 255, 0.75);
    text-shadow: 0 1px 6px rgba(0, 0, 0, 0.2);
    line-height: 1.8;
  }

  /* ══════ INVITATION LINE ══════ */
  .cover-invite {
    font-family: 'Noto Serif SC', serif;
    font-size: 15px;
    letter-spacing: 6px;
    color: var(--gold-light);
    text-shadow: 0 1px 8px rgba(0, 0, 0, 0.2);
    margin-top: 36px;
    margin-bottom: 44px;
  }

  /* ══════ SEAL BUTTON ══════ */
  .seal-wrap {
    position: relative;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .seal-outer {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    background: transparent;
    border: 2.5px solid var(--gold);
    display: flex;
    align-items: center;
    justify-content: center;
    animation: sealPulse 3s ease-in-out infinite;
    transition: all 0.4s ease;
    position: relative;
    box-shadow: 0 0 30px rgba(182, 138, 83, 0.3), inset 0 0 20px rgba(182, 138, 83, 0.08);
  }
  .seal-inner {
    width: 68px;
    height: 68px;
    border-radius: 50%;
    border: 1.5px solid rgba(212, 184, 150, 0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    background: rgba(182, 138, 83, 0.06);
  }
  .seal-text {
    font-family: 'Noto Serif SC', serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 6px;
    color: var(--gold-light);
    text-shadow: 0 0 12px rgba(182, 138, 83, 0.3);
  }

  @keyframes sealPulse {
    0%, 100% {
      box-shadow: 0 0 30px rgba(182, 138, 83, 0.3), inset 0 0 20px rgba(182, 138, 83, 0.08);
    }
    50% {
      box-shadow: 0 0 50px rgba(182, 138, 83, 0.5), inset 0 0 30px rgba(182, 138, 83, 0.15);
    }
  }

  .seal-wrap:active .seal-outer {
    transform: scale(0.92);
    border-color: #fff;
    box-shadow: 0 0 60px rgba(182, 138, 83, 0.7), inset 0 0 40px rgba(182, 138, 83, 0.2);
  }

  /* ══════ HINT TEXT ══════ */
  .cover-hint {
    margin-top: 20px;
    font-size: 11px;
    letter-spacing: 4px;
    color: rgba(255, 255, 255, 0.5);
    animation: hintFade 2.5s ease-in-out infinite;
  }
  @keyframes hintFade {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 0.85; }
  }

  /* ══════ PAGE TRANSITION ══════ */
  .cover.fade-out {
    animation: coverFadeOut 0.6s ease forwards;
  }
  @keyframes coverFadeOut {
    0% { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: scale(1.05); }
  }

  /* ══════ MUSIC TOGGLE ══════ */
  .music-btn {
    position: fixed;
    bottom: 30px;
    right: 20px;
    z-index: 200;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: rgba(0, 0, 0, 0.45);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(212, 184, 150, 0.4);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    box-shadow: 0 3px 14px rgba(0, 0, 0, 0.15);
    transition: all 0.3s ease;
  }
  .music-btn.on {
    animation: musicPulse 1.5s ease-in-out infinite;
  }
  @keyframes musicPulse {
    0%, 100% { box-shadow: 0 3px 14px rgba(0, 0, 0, 0.15); }
    50% { box-shadow: 0 3px 22px rgba(182, 138, 83, 0.35); }
  }

  /* ══════ PETALS ══════ */
  .petal {
    position: fixed;
    pointer-events: none;
    z-index: 5;
    font-size: 16px;
    opacity: 0.4;
    animation: petalFall linear infinite;
  }
  @keyframes petalFall {
    0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
    10% { opacity: 0.4; }
    90% { opacity: 0.3; }
    100% { transform: translateY(105vh) rotate(720deg); opacity: 0; }
  }
</style>

<script>
// ═══════════════════════════════════════════
//  Open Invitation — transition + navigate
// ═══════════════════════════════════════════

    window.location.href = 'invitation.html';

// ═══════════════════════════════════════════
//  Music: 爱的纪念 - Web Audio 钢琴合成
// ═══════════════════════════════════════════
let musicPlaying = true;
let audioCtx = null;
let masterGain = null;
let musicTimer = null;
const musicToggleBtn = document.getElementById('musicToggle');

const melody = [
  392, 415, 466, 523, 587, 622, 587, 523, 466, 415, 392,
  349, 392, 415, 466, 523, 466, 415, 392, 349, 311, 349,
  392, 523, 466, 415, 392, 349, 311, 349, 392, 523, 587,
  622, 587, 523, 466, 523, 466, 415, 392, 349, 311, 349,
  392, 415, 466, 523, 587, 622, 587, 523, 466, 415, 392,
  349, 392, 415, 466, 523, 466, 415, 392, 349, 311,
  349, 392, 415, 466, 523,
];

const longNotes = new Set([10, 21, 32, 38, 41, 43, 54, 64, 69]);
const noteDuration = 0.40;
const loopPause = 2.2;

const CHORDS = {
  'Cm':  { bass: 131, notes: [262, 311, 392, 523] },
  'Fm':  { bass: 175, notes: [349, 415, 523, 659] },
  'G7':  { bass: 196, notes: [392, 494, 587, 698] },
  'Eb':  { bass: 156, notes: [311, 392, 466, 622] },
};

const chordChanges = [
  { at: 0,  ch: 'Cm' }, { at: 11, ch: 'Fm' }, { at: 17, ch: 'Cm' },
  { at: 22, ch: 'Cm' }, { at: 28, ch: 'G7' }, { at: 31, ch: 'Cm' },
  { at: 33, ch: 'Eb' }, { at: 36, ch: 'Cm' }, { at: 44, ch: 'Cm' },
  { at: 50, ch: 'G7' }, { at: 55, ch: 'Fm' }, { at: 61, ch: 'Cm' },
  { at: 65, ch: 'G7' }, { at: 67, ch: 'Cm' },
];

function pianoNote(freq, startTime, duration, outputGain, velocity = 1.0) {
  const s = 0.22 * velocity;
  const harmonics = [
    [1, 1.0*s], [2, 0.45*s], [3, 0.22*s], [4, 0.10*s],
    [5.01, 0.05*s], [6.02, 0.025*s], [8.03, 0.011*s],
  ];
  harmonics.forEach(([ratio, amp]) => {
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq * ratio, startTime);
    const a = 0.007, d = duration * 0.5, sLvl = amp * 0.10;
    g.gain.setValueAtTime(0, startTime);
    g.gain.linearRampToValueAtTime(amp * 0.30, startTime + a);
    g.gain.exponentialRampToValueAtTime(sLvl, startTime + a + d);
    g.gain.exponentialRampToValueAtTime(0.0004, startTime + duration + 0.02);
    osc.connect(g); g.connect(outputGain);
    osc.start(startTime); osc.stop(startTime + duration + 0.12);
  });
}

function bassNote(freq, startTime, duration, outputGain) {
  [1, 0.5].forEach((vol, idx) => {
    const f = idx === 0 ? freq : freq * 1.5;
    [[1,1],[2,0.5],[3,0.2],[4,0.09]].forEach(([ratio, amp]) => {
      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(f * ratio, startTime);
      g.gain.setValueAtTime(0, startTime);
      g.gain.linearRampToValueAtTime(amp * 0.14 * vol, startTime + 0.012);
      g.gain.exponentialRampToValueAtTime(amp * 0.03 * vol, startTime + duration * 0.35);
      g.gain.exponentialRampToValueAtTime(0.0002, startTime + duration);
      osc.connect(g); g.connect(outputGain);
      osc.start(startTime); osc.stop(startTime + duration + 0.18);
    });
  });
}

function arpeggio(chordName, startTime, outputGain) {
  const ch = CHORDS[chordName]; if (!ch) return;
  const p = [
    ch.notes[0], ch.notes[1], ch.notes[2], ch.notes[3],
    ch.notes[2]*2, ch.notes[3]*2,
    ch.notes[3]*2, ch.notes[2]*2, ch.notes[1]*2, ch.notes[0]*2,
    ch.notes[1], ch.notes[0],
  ];
  const total = noteDuration * 3.5, step = total / p.length;
  p.forEach((freq, i) => {
    pianoNote(freq, startTime + i * step, step * 2.8, outputGain, 0.38);
  });
}

function chordPad(chordName, startTime, duration, outputGain) {
  const ch = CHORDS[chordName]; if (!ch) return;
  ch.notes.forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, startTime);
    const vol = i === 0 ? 0.016 : 0.010;
    g.gain.setValueAtTime(0, startTime);
    g.gain.linearRampToValueAtTime(vol, startTime + 0.2);
    g.gain.setValueAtTime(vol, startTime + duration * 0.65);
    g.gain.exponentialRampToValueAtTime(0.0002, startTime + duration);
    osc.connect(g); g.connect(outputGain);
    osc.start(startTime); osc.stop(startTime + duration + 0.3);
  });
}

function playArrangement() {
  if (!musicPlaying || !audioCtx) return;
  const now = audioCtx.currentTime;
  let t = now + 0.06;
  let curCh = 'Cm', nxt = 0;

  melody.forEach((freq, i) => {
    if (nxt < chordChanges.length && chordChanges[nxt].at === i) {
      curCh = chordChanges[nxt].ch;
      const cd = CHORDS[curCh];
      if (cd) {
        bassNote(cd.bass, t, noteDuration * 3.2, masterGain);
        arpeggio(curCh, t, masterGain);
        const span = (nxt + 1 < chordChanges.length)
          ? (chordChanges[nxt + 1].at - i) * noteDuration : noteDuration * 5;
        chordPad(curCh, t, Math.min(span, noteDuration * 4.5), masterGain);
      }
      nxt++;
    }

    const dur = longNotes.has(i) ? noteDuration * 2.0 : noteDuration;
    pianoNote(freq, t, dur, masterGain, 0.88);
    pianoNote(freq * 2, t, dur * 0.95, masterGain, 0.22);

    if (longNotes.has(i) || (i + 1) % 11 === 0) {
      reverb(freq, t, masterGain, longNotes.has(i) ? 1.3 : 0.8);
    }
    if (i % 4 === 0 && CHORDS[curCh]) {
      bassNote(CHORDS[curCh].bass, t, noteDuration * 1.2, masterGain);
    }
    t += noteDuration;
  });

  musicTimer = setTimeout(playArrangement, (melody.length * noteDuration + loopPause) * 1000);
}

function reverb(freq, startTime, outputGain, intensity = 1.0) {
  [0.22, 0.50, 0.82, 1.18].forEach(delay => {
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, startTime + delay);
    g.gain.setValueAtTime(0, startTime);
    g.gain.setValueAtTime(0.013 * intensity, startTime + delay);
    g.gain.exponentialRampToValueAtTime(0.0002, startTime + delay + 0.85);
    osc.connect(g); g.connect(outputGain);
    osc.start(startTime + delay); osc.stop(startTime + delay + 0.95);
  });
}

function startPiano() {
  if (audioCtx) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.setValueAtTime(0.22, audioCtx.currentTime);
    masterGain.connect(audioCtx.destination);
    playArrangement();
    musicToggleBtn.classList.add('on');
    musicToggleBtn.textContent = '🎵';
  } catch(e) { musicToggleBtn.textContent = '🔇'; }
}

function toggleMusic() {
  if (!audioCtx) { startPiano(); musicPlaying = true; return; }
  if (musicPlaying) {
    masterGain.gain.setValueAtTime(0, audioCtx.currentTime);
    musicToggleBtn.classList.remove('on');
    musicToggleBtn.textContent = '🔇';
    musicPlaying = false;
  } else {
    masterGain.gain.setValueAtTime(0.22, audioCtx.currentTime);
    musicToggleBtn.classList.add('on');
    musicToggleBtn.textContent = '🎵';
    musicPlaying = true;
    if (musicTimer) clearTimeout(musicTimer);
    playArrangement();
  }
}

function initMusic() {
  if (!audioCtx && musicPlaying) startPiano();
}
document.addEventListener('click', initMusic, { once: true });
document.addEventListener('touchstart', initMusic, { once: true });
